<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FYHHRLZQ6T"></script>

    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "vv1uryi641");

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WEBサイトを「経費」から自社の「資産」へ。沖縄のIT HUBは、制作会社への依存を脱却し、AIを活用したWEB内製化とデジタル自立を支援します。管理費という浪費を終わらせ、企業の想いを永続的な資産へと昇華させる戦略的パートナーです。">
    <meta name="keywords" content="IT HUB, WEBサイト資産化, 沖縄, デジタル自立, 内製化, 経費削減, ITの民主化, 戦略コンサルティング">
    <title>BLOG | IT HUB | WEBサイトを、自社の「資産」へ</title>
    <link rel="icon" href="./images/favicon.png" type="image/png">
    
    <!-- スタイル: Tailwind CSS & Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Noto+Sans+JP:wght@300;400;700;900&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            scroll-behavior: smooth;
            background-color: #fff;
        }

        /* フェードインアニメーション */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* カスタムスクロールバー */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #000; }
    </style>
</head>
<body class="text-black selection:bg-black selection:text-white overflow-x-hidden flex flex-col min-h-screen">

    <div id="root" class="bg-white">
        <!-- 読み込み中のスケルトン表示 -->
        <div class="h-screen w-full flex items-center justify-center bg-white">
            <div class="text-[10px] tracking-[0.5em] animate-pulse uppercase text-gray-400">Hub Initializing...</div>
        </div>
    </div>

    <!-- ライブラリの読み込み -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- メインスクリプト -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // X (Twitter) アイコンのカスタムSVG
        const XIcon = () => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
            </svg>
        );

        const MenuIcon = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        );

        const CloseIcon = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        );

        const App = () => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [isScrolled, setIsScrolled] = useState(false);
            const revealRefs = useRef([]);

            useEffect(() => {
                // Lucideアイコンの初期化
                lucide.createIcons();

                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 50);

                    // スクロール検知によるアニメーション発火
                    revealRefs.current.forEach((el) => {
                        if (el) {
                            const rect = el.getBoundingClientRect();
                            if (rect.top < window.innerHeight * 0.9) {
                                el.classList.add('active');
                            }
                        }
                    });
                };

                window.addEventListener('scroll', handleScroll);
                handleScroll(); // 初回実行

                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            // メニュー開閉時のスクロール制御
            useEffect(() => {
                if (isMenuOpen) {
                    document.body.style.overflow = 'hidden';
                } else {
                    document.body.style.overflow = 'unset';
                }
            }, [isMenuOpen]);

            const addToRefs = (el) => {
                if (el && !revealRefs.current.includes(el)) {
                    revealRefs.current.push(el);
                }
            };

            const navItems = [
                { name: 'TOP', href: 'index.html' },
                { name: 'MNKR', href: 'index.html#' },
                { name: 'ABOUT', href: 'about.html' },
                { name: 'WORKS', href: 'works.html' },
                { name: 'BLOG', href: '#' },
                { name: 'CONTACT', href: '/#contact' }
            ];

            return (
                <div className="flex flex-col min-h-screen bg-white">
                    {/* Navigation */}
                    <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-700 px-6 py-4 md:px-12 flex justify-between items-center ${isScrolled || isMenuOpen ? 'bg-white/90 backdrop-blur-xl border-b border-gray-100 py-4 shadow-sm' : 'bg-white/90 backdrop-blur-xl border-b border-gray-100 py-10'}`}>
                        <a href="index.html" className="flex items-center relative z-50">
                            <img src="./images/logo.png" alt="IT HUB" className="h-10 md:h-14 w-auto -ml-3" />
                        </a>

                        <div className="flex items-center space-x-6 md:space-x-12">
                            {/* Desktop Menu */}
                            <div className="hidden lg:flex space-x-10 text-[10px] uppercase tracking-[0.4em] font-bold text-black font-sans">
                                {navItems.map((item) => (
                                    <a key={item.name} href={item.href} className={`transition-opacity transition-colors ${item.name === 'BLOG' ? 'opacity-100 border-b-2 border-black pb-1' : 'opacity-100 hover:opacity-50 text-black'}`}>{item.name}</a>
                                ))}
                            </div>

                            {/* Social Link (Desktop) */}
                            <div className="hidden md:block">
                                <a href="https://x.com/" target="_blank" rel="noopener noreferrer" className="hover:opacity-40 transition-opacity text-black">
                                    <XIcon />
                                </a>
                            </div>

                            {/* Hamburger Button */}
                            <button
                                onClick={() => setIsMenuOpen(!isMenuOpen)}
                                className="lg:hidden relative z-50 w-10 h-10 flex items-center justify-center text-black"
                            >
                                {isMenuOpen ? <CloseIcon /> : <MenuIcon />}
                            </button>
                        </div>

                        {/* Mobile Menu Overlay */}
                        <div className={`fixed inset-0 bg-white z-40 lg:hidden transition-all duration-500 ease-in-out ${isMenuOpen ? 'opacity-100 visible' : 'opacity-0 invisible pointer-events-none'}`}>
                            <div className="h-full flex flex-col justify-center items-center p-12">
                                <div className="space-y-8 text-center">
                                    {navItems.map((item, idx) => (
                                        <div key={item.name} className={`transform transition-all duration-500 ${isMenuOpen ? 'translate-y-0 opacity-100' : 'translate-y-10 opacity-0'}`} style={{ transitionDelay: `${idx * 100}ms` }}>
                                            <a
                                                href={item.href}
                                                onClick={() => setIsMenuOpen(false)}
                                                className={`text-4xl font-bold tracking-tighter uppercase transition-colors ${item.name === 'BLOG' ? 'text-black border-b-2 border-black' : 'text-gray-400 hover:text-black'}`}
                                            >
                                                {item.name}
                                            </a>
                                        </div>
                                    ))}

                                    {/* Xリンク（テキスト） */}
                                    <div
                                        className={`transform transition-all duration-500 ${isMenuOpen ? 'translate-y-0 opacity-100' : 'translate-y-10 opacity-0'}`}
                                        style={{ transitionDelay: `${navItems.length * 100}ms` }}
                                    >
                                        <a
                                            href="https://x.com/"
                                            target="_blank"
                                            rel="noopener noreferrer"
                                            onClick={() => setIsMenuOpen(false)}
                                            className="text-4xl font-bold tracking-tighter uppercase transition-colors text-gray-400 hover:text-black"
                                        >
                                            X
                                        </a>
                                    </div>
                                </div>
                                
                                <div className={`mt-20 transform transition-all duration-700 delay-500 ${isMenuOpen ? 'translate-y-0 opacity-100' : 'translate-y-10 opacity-0'}`}>
                                    <a href="https://x.com/" target="_blank" rel="noopener noreferrer" className="p-4 bg-black text-white rounded-full inline-block text-black">
                                        <XIcon />
                                    </a>
                                </div>
                            </div>
                        </div>
                    </nav>

                    {/* Coming Soon Content */}
                    <main className="flex-grow flex flex-col justify-center items-center py-40 px-6 md:px-12 bg-white relative overflow-hidden">
                        <div className="absolute inset-0 z-0 opacity-5 pointer-events-none">
                            <div className="absolute inset-0" style={{ backgroundImage: 'radial-gradient(circle at 2px 2px, black 1px, transparent 0)', backgroundSize: '60px 60px' }}></div>
                        </div>

                        <div className="max-w-4xl w-full text-center relative z-10" ref={addToRefs}>
                            <h1 className="text-7xl md:text-[8rem] font-black tracking-tighter uppercase mb-8 reveal active text-black">
                                BLOG
                            </h1>
                            <div className="inline-flex items-center space-x-4 bg-black text-white px-8 py-4 reveal active shrink-0 shadow-2xl" style={{ transitionDelay: '0.2s' }}>
                                <i data-lucide="clock" className="w-5 h-5"></i>
                                <span className="text-[10px] md:text-xs font-bold tracking-[0.4em] uppercase">Coming Soon</span>
                            </div>
                            <p className="mt-12 text-gray-500 font-light text-lg md:text-xl reveal active" style={{ transitionDelay: '0.4s' }}>
                                現在、デジタル資産形成に役立つ知見や<br className="md:hidden" />最新の情報を準備中です。<br />
                                公開まで今しばらくお待ちください。
                            </p>
                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="bg-black text-gray-600 py-32 px-6 md:px-12 mt-auto">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-end space-y-16 md:space-y-0">
                            <div className="space-y-10">
                                <div className="text-4xl font-black tracking-tighter text-white">IT HUB</div>
                                <p className="text-[10px] tracking-[0.3em] uppercase opacity-50">© 2026 IT HUB Inc. All rights reserved.</p>
                            </div>
                            <div className="flex flex-col items-start md:items-end space-y-6">
                                <a href="https://x.com/" target="_blank" rel="noopener noreferrer" className="group flex items-center space-x-4 text-white">
                                    <span className="text-[10px] font-bold tracking-widest uppercase">Follow Updates</span>
                                    <div className="p-3 bg-gray-900 group-hover:bg-white group-hover:text-black transition-all duration-500">
                                        <XIcon />
                                    </div>
                                </a>
                                <p className="text-[10px] tracking-widest uppercase opacity-30">Designed for Future Sovereignty</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        // Render the App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
