<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORKS | IT HUB | WEBサイトを、自社の「資産」へ</title>
    <link rel="icon" href="./images/favicon.png" type="image/png">

    <!-- スタイル: Tailwind CSS & Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Noto+Sans+JP:wght@300;400;700;900&display=swap');

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            scroll-behavior: smooth;
            background-color: #fff;
        }

        /* フェードインアニメーション */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* カスタムスクロールバー */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #000;
        }

        /* ホバー時の画像ズームアフェクト用 */
        .zoom-effect-container {
            overflow: hidden;
            border: 1px solid #f1f1f1;
        }

        .zoom-effect-container img {
            transition: transform 0.7s ease;
        }

        .zoom-effect-container:hover img {
            transform: scale(1.05);
        }
    </style>
</head>

<body class="text-black selection:bg-black selection:text-white overflow-x-hidden">

    <div id="root">
        <!-- 読み込み中のスケルトン表示 -->
        <div class="h-screen w-full flex items-center justify-center bg-white">
            <div class="text-[10px] tracking-[0.5em] animate-pulse uppercase text-gray-400">Hub Initializing...</div>
        </div>
    </div>

    <!-- ライブラリの読み込み -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- メインスクリプト -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // X (Twitter) アイコンのカスタムSVG
        const XIcon = () => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
            </svg>
        );

        const App = () => {
            const [isScrolled, setIsScrolled] = useState(false);
            const revealRefs = useRef([]);

            useEffect(() => {
                // Lucideアイコンの初期化
                lucide.createIcons();

                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 50);

                    // スクロール検知によるアニメーション発火
                    revealRefs.current.forEach((el) => {
                        if (el) {
                            const rect = el.getBoundingClientRect();
                            if (rect.top < window.innerHeight * 0.9) {
                                el.classList.add('active');
                            }
                        }
                    });
                };

                window.addEventListener('scroll', handleScroll);
                handleScroll(); // 初回実行

                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const addToRefs = (el) => {
                if (el && !revealRefs.current.includes(el)) {
                    revealRefs.current.push(el);
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Navigation */}
                    <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-700 px-6 py-4 md:px-12 flex justify-between items-center ${isScrolled ? 'bg-white/90 backdrop-blur-xl border-b border-gray-100 py-4 shadow-sm' : 'bg-transparent py-10'
                        }`}>
                        <a href="index.html" className="flex items-center">
                            <img src="./images/logo.png" alt="IT HUB" className="h-10 md:h-14 w-auto -ml-3" />
                        </a>

                        <div className="flex items-center space-x-8 md:space-x-12">
                            <div className="hidden lg:flex space-x-10 text-[10px] uppercase tracking-[0.4em] font-bold text-black">
                                {['TOP', 'MNKR', 'ABOUT', 'WORKS', 'BLOG', 'CONTACT'].map((item) => (
                                    <a key={item} href={item === 'WORKS' ? '#' : item === 'ABOUT' ? 'about.html' : item === 'BLOG' ? 'blog.html' : item === 'TOP' ? 'index.html' : 'index.html#' + item.toLowerCase()} className={`transition-opacity ${item === 'WORKS' ? 'opacity-100 border-b border-black pb-1' : 'hover:opacity-30'}`}>{item}</a>
                                ))}
                            </div>
                            <a href="https://x.com/" target="_blank" rel="noopener noreferrer" className="hover:opacity-40 transition-opacity">
                                <XIcon />
                            </a>
                        </div>
                    </nav>

                    {/* Page Header */}
                    <section className="relative pt-48 pb-20 px-6 md:px-12 bg-white text-black overflow-hidden shrink-0">
                        <div className="absolute inset-0 z-0 opacity-5 pointer-events-none">
                            <div className="absolute inset-0" style={{ backgroundImage: 'radial-gradient(circle at 2px 2px, black 1px, transparent 0)', backgroundSize: '60px 60px' }}></div>
                        </div>
                        <div className="max-w-6xl mx-auto relative z-10 text-center">
                            <h1 className="text-6xl md:text-8xl font-black tracking-tighter uppercase mb-6 reveal active text-black">WORKS</h1>
                            <p className="text-[10px] tracking-[0.5em] text-gray-400 uppercase font-mono reveal active" style={{ transitionDelay: '0.2s' }}>Selected Projects / Portfolio</p>
                        </div>
                    </section>

                    {/* Works Grid */}
                    <main className="flex-grow py-32 px-6 md:px-12 bg-white">
                        <div className="max-w-7xl mx-auto">

                            {/* Works Item : ドローンサポート沖縄 */}
                            <div ref={addToRefs} className="group reveal">
                                <a href="https://drone-support.okinawa/" target="_blank" rel="noopener noreferrer" className="block w-full">
                                    <div className="grid md:grid-cols-2 gap-12 md:gap-20 items-center">

                                        {/* Thumbnail Area - Laptop Frame */}
                                        <div className="relative w-full max-w-lg mx-auto group perspective-1000">
                                            {/* Laptop Screen Bezel */}
                                            <div className="relative bg-[#0d0d0d] rounded-t-xl md:rounded-t-2xl p-2 pb-0 md:p-3 md:pb-0 border-t-2 border-l-2 border-r-2 border-gray-700 shadow-[0_-5px_20px_rgba(0,0,0,0.15)] z-10 transition-transform duration-700 group-hover:-translate-y-2">
                                                {/* Web Camera Dot */}
                                                <div className="absolute top-1 md:top-1.5 left-1/2 transform -translate-x-1/2 w-1 h-1 md:w-1.5 md:h-1.5 bg-gray-900 border border-gray-700 rounded-full"></div>

                                                {/* Inner Screen */}
                                                <div className="relative aspect-[16/9] bg-gray-100 overflow-hidden rounded-sm md:rounded zoom-effect-container">
                                                    <div className="absolute top-4 right-4 z-20 bg-black text-white p-2 md:p-3 rotate-45 opacity-0 group-hover:opacity-100 transition-all duration-500 transform group-hover:scale-100 scale-50">
                                                        <i data-lucide="arrow-up-right" className="w-4 h-4 md:w-5 md:h-5 -rotate-45"></i>
                                                    </div>
                                                    <img src="./images/drone-support.png" alt="ドローンサポート沖縄" className="w-full h-full object-cover object-left-top bg-gray-100" onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/1280x800.png?text=Drone+Support+Okinawa+Screenshot'; }} />
                                                    {/* Fallback overlay in case image takes time to load */}
                                                    <div className="absolute inset-0 bg-black/5 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                                                </div>

                                                {/* Bezel Bottom Logomark Area */}
                                                <div className="h-4 md:h-6 w-full flex items-center justify-center">
                                                    <div className="text-[5px] md:text-[6px] tracking-[0.2em] text-gray-500 font-bold uppercase opacity-80">IT HUB</div>
                                                </div>
                                            </div>

                                            {/* Laptop Base / Keyboard Deck Edge */}
                                            <div className="relative z-20 h-3 md:h-4 bg-gradient-to-b from-gray-300 via-gray-400 to-gray-500 rounded-b-xl md:rounded-b-2xl w-[114%] -ml-[7%] flex justify-center border-t border-gray-400 shadow-[0_20px_25px_-5px_rgba(0,0,0,0.2)] transition-transform duration-700 group-hover:-translate-y-2">
                                                {/* Trackpad Opening Notch */}
                                                <div className="w-1/6 h-1 md:h-1.5 bg-gray-500 rounded-b-lg shadow-inner"></div>
                                                {/* Base Curve Shadow */}
                                                <div className="absolute inset-x-0 bottom-0 h-1 bg-gradient-to-t from-gray-600 to-transparent rounded-b-xl md:rounded-b-2xl opacity-50"></div>
                                            </div>

                                            {/* Desk Shadow (Anchored) */}
                                            <div className="absolute -bottom-4 left-1/2 transform -translate-x-1/2 w-3/4 h-2 bg-black blur-xl opacity-20 group-hover:opacity-40 transition-opacity duration-700"></div>
                                        </div>

                                        {/* Detail Area */}
                                        <div className="space-y-6 lg:pl-10">
                                            <div className="space-y-2">
                                                <p className="text-[10px] tracking-[0.3em] font-bold text-gray-400 uppercase font-mono border-b border-gray-100 pb-4 mb-4 inline-block">Web Design / Development</p>
                                                <h2 className="text-3xl md:text-4xl font-bold tracking-tight group-hover:text-gray-500 transition-colors duration-300">
                                                    ドローンサポート沖縄 様
                                                </h2>
                                            </div>
                                            <div className="pt-4">
                                                <span className="inline-flex items-center space-x-2 text-sm font-bold tracking-widest uppercase border-b border-black pb-1 group-hover:border-gray-400 group-hover:text-gray-500 transition-all">
                                                    <span>View Website</span>
                                                    <i data-lucide="arrow-right" className="w-4 h-4 ml-2 group-hover:translate-x-2 transition-transform duration-300"></i>
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                </a>
                            </div>

                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="bg-black text-gray-600 py-32 px-6 md:px-12 mt-auto">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-end space-y-16 md:space-y-0">
                            <div className="space-y-10">
                                <div className="text-4xl font-black tracking-tighter text-white">IT HUB</div>
                                <p className="text-[10px] tracking-[0.3em] uppercase opacity-50">© 2026 IT HUB Inc. All rights reserved.</p>
                            </div>
                            <div className="flex flex-col items-start md:items-end space-y-6">
                                <a href="https://x.com/" target="_blank" rel="noopener noreferrer" className="group flex items-center space-x-4 text-white">
                                    <span className="text-[10px] font-bold tracking-widest uppercase">Follow Updates</span>
                                    <div className="p-3 bg-gray-900 group-hover:bg-white group-hover:text-black transition-all duration-500">
                                        <XIcon />
                                    </div>
                                </a>
                                <p className="text-[10px] tracking-widest uppercase opacity-30">Designed for Future Sovereignty</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        // Render the App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
