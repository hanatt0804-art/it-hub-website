<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>送信完了 | IT HUB</title>
    <link rel="icon" href="./images/favicon.png" type="image/png">
    
    <!-- スタイル: Tailwind CSS & Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Noto+Sans+JP:wght@300;400;700;900&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #fff;
            color: #000;
        }

        /* フェードインアニメーション */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="selection:bg-black selection:text-white h-screen flex flex-col justify-between overflow-hidden">

    <!-- ライブラリの読み込み -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Navigation (Simplified) -->
    <nav class="fixed top-0 left-0 right-0 z-50 px-6 py-10 md:px-12 flex justify-between items-center w-full">
        <a href="index.html" class="flex items-center">
            <img src="./images/logo.png" alt="IT HUB" class="h-10 md:h-14 w-auto -ml-3" />
        </a>
    </nav>

    <!-- Content -->
    <main class="flex-grow flex items-center justify-center px-6">
        <div class="max-w-3xl w-full text-center reveal">
            <div class="inline-flex items-center justify-center w-24 h-24 rounded-full border border-gray-100 mb-12 relative overflow-hidden group">
                <i data-lucide="check" class="w-10 h-10 text-black relative z-10 transition-transform duration-500 group-hover:scale-125"></i>
                <div class="absolute inset-0 bg-gray-50 translate-y-full transition-transform duration-500"></div>
            </div>
            
            <h1 class="text-4xl md:text-6xl font-bold tracking-tighter mb-8 text-black">
                THANK YOU
            </h1>
            <h2 class="text-xl md:text-2xl font-light text-gray-400 mb-12 tracking-wide">
                お問い合わせを受け付けました。
            </h2>
            
            <p class="text-gray-500 font-light leading-relaxed mb-16 max-w-xl mx-auto">
                自動返信メールを送信いたしましたのでご確認ください。<br>
                内容を確認次第、担当者より折り返しご連絡させていただきます。
            </p>

            <a href="index.html" class="group relative px-16 py-6 inline-flex overflow-hidden bg-black text-white transition-all duration-500 border border-black hover:border-gray-800">
                <span class="relative z-10 font-bold tracking-[0.3em] uppercase text-xs flex items-center group-hover:text-black transition-colors duration-500">
                    <i data-lucide="arrow-left" class="w-4 h-4 mr-4"></i>
                    Back to Top
                </span>
                <div class="absolute inset-0 bg-white translate-x-full group-hover:translate-x-0 transition-transform duration-700 ease-out"></div>
            </a>
        </div>
    </main>

    <!-- Footer (Simplified) -->
    <footer class="py-10 text-center">
        <p class="text-[10px] tracking-[0.3em] uppercase text-gray-300">© 2026 IT HUB Inc. All rights reserved.</p>
    </footer>

    <script>
        // Lucideアイコンの初期化
        lucide.createIcons();
    </script>
</body>
</html>
