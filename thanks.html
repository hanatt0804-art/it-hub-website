<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- Google tag (gtag.js) -->

    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "vv1uryi641");

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WEBサイトを「経費」から自社の「資産」へ。沖縄のIT HUBは、制作会社への依存を脱却し、AIを活用したWEB内製化とデジタル自立を支援します。管理費という浪費を終わらせ、企業の想いを永続的な資産へと昇華させる戦略的パートナーです。">
    <meta name="keywords" content="IT HUB, WEBサイト資産化, 沖縄, デジタル自立, 内製化, 経費削減, ITの民主化, 戦略コンサルティング">
    <title>送信完了 | IT HUB</title>
    <link rel="icon" href="./images/favicon.png" type="image/png">
    
    <!-- スタイル: Tailwind CSS & Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Noto+Sans+JP:wght@300;400;700;900&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #fff;
            color: #000;
        }

        /* フェードインアニメーション */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="selection:bg-black selection:text-white h-screen flex flex-col justify-between overflow-hidden">

    <div id="root"></div>

    <!-- ライブラリの読み込み -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- メインスクリプト -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // X (Twitter) アイコンのカスタムSVG
        const XIcon = () => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
            </svg>
        );

        const MenuIcon = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        );

        const CloseIcon = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        );

        const App = () => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [isScrolled, setIsScrolled] = useState(false);

            useEffect(() => {
                lucide.createIcons();
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                if (isMenuOpen) {
                    document.body.style.overflow = 'hidden';
                } else {
                    document.body.style.overflow = 'unset';
                }
            }, [isMenuOpen]);

            const navItems = [
                { name: 'TOP', href: 'index.html' },
                { name: 'MNKR', href: 'index.html#' },
                { name: 'ABOUT', href: 'about.html' },
                { name: 'WORKS', href: 'works.html' },
                { name: 'BLOG', href: 'blog.html' },
                { name: 'CONTACT', href: '/#contact' }
            ];

            return (
                <div className="min-h-screen flex flex-col justify-between overflow-x-hidden">
                    {/* Navigation */}
                    <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-700 px-6 py-4 md:px-12 flex justify-between items-center ${isScrolled || isMenuOpen ? 'bg-white/90 backdrop-blur-xl border-b border-gray-100 py-4 shadow-sm' : 'bg-white/90 backdrop-blur-xl border-b border-gray-100 py-10'}`}>
                        <a href="index.html" className="flex items-center relative z-50">
                            <img src="./images/logo.png" alt="IT HUB" className="h-10 md:h-14 w-auto -ml-3" />
                        </a>

                        <div className="flex items-center space-x-6 md:space-x-12">
                            {/* Desktop Menu */}
                            <div className="hidden lg:flex space-x-10 text-[10px] uppercase tracking-[0.4em] font-bold text-black font-sans">
                                {navItems.map((item) => (
                                    <a key={item.name} href={item.href} className="hover:opacity-30 transition-opacity">{item.name}</a>
                                ))}
                            </div>

                            {/* Social Link (Desktop) */}
                            <div className="hidden md:block">
                                <a href="https://x.com/" target="_blank" rel="noopener noreferrer" className="hover:opacity-40 transition-opacity text-black">
                                    <XIcon />
                                </a>
                            </div>

                            {/* Hamburger Button */}
                            <button
                                onClick={() => setIsMenuOpen(!isMenuOpen)}
                                className="lg:hidden relative z-50 w-10 h-10 flex items-center justify-center text-black"
                            >
                                {isMenuOpen ? <CloseIcon /> : <MenuIcon />}
                            </button>
                        </div>

                        {/* Mobile Menu Overlay */}
                        <div className={`fixed inset-0 bg-white z-40 lg:hidden transition-all duration-500 ease-in-out ${isMenuOpen ? 'opacity-100 visible' : 'opacity-0 invisible pointer-events-none'}`}>
                            <div className="h-full flex flex-col justify-center items-center p-12">
                                <div className="space-y-8 text-center">
                                    {navItems.map((item, idx) => (
                                        <div key={item.name} className={`transform transition-all duration-500 ${isMenuOpen ? 'translate-y-0 opacity-100' : 'translate-y-10 opacity-0'}`} style={{ transitionDelay: `${idx * 100}ms` }}>
                                            <a
                                                href={item.href}
                                                onClick={() => setIsMenuOpen(false)}
                                                className="text-4xl font-bold tracking-tighter uppercase transition-colors text-gray-400 hover:text-black"
                                            >
                                                {item.name}
                                            </a>
                                        </div>
                                    ))}

                                    {/* Xリンク（テキスト） */}
                                    <div
                                        className={`transform transition-all duration-500 ${isMenuOpen ? 'translate-y-0 opacity-100' : 'translate-y-10 opacity-0'}`}
                                        style={{ transitionDelay: `${navItems.length * 100}ms` }}
                                    >
                                        <a
                                            href="https://x.com/"
                                            target="_blank"
                                            rel="noopener noreferrer"
                                            onClick={() => setIsMenuOpen(false)}
                                            className="text-4xl font-bold tracking-tighter uppercase transition-colors text-gray-400 hover:text-black"
                                        >
                                            X
                                        </a>
                                    </div>
                                </div>
                                
                                <div className={`mt-20 transform transition-all duration-700 delay-500 ${isMenuOpen ? 'translate-y-0 opacity-100' : 'translate-y-10 opacity-0'}`}>
                                    <a href="https://x.com/" target="_blank" rel="noopener noreferrer" className="p-4 bg-black text-white rounded-full inline-block text-black">
                                        <XIcon />
                                    </a>
                                </div>
                            </div>
                        </div>
                    </nav>

                    {/* Content */}
                    <main className="flex-grow flex items-center justify-center px-6 pt-32">
                        <div className="max-w-3xl w-full text-center reveal">
                            <div className="inline-flex items-center justify-center w-24 h-24 rounded-full border border-gray-100 mb-12 relative overflow-hidden group">
                                <i data-lucide="check" className="w-10 h-10 text-black relative z-10 transition-transform duration-500 group-hover:scale-125"></i>
                                <div className="absolute inset-0 bg-gray-50 translate-y-full transition-transform duration-500"></div>
                            </div>
                            
                            <h1 className="text-4xl md:text-6xl font-bold tracking-tighter mb-8 text-black">
                                THANK YOU
                            </h1>
                            <h2 className="text-xl md:text-2xl font-light text-gray-400 mb-12 tracking-wide">
                                お問い合わせを受け付けました。
                            </h2>
                            
                            <p className="text-gray-500 font-light leading-relaxed mb-16 max-w-xl mx-auto">
                                自動返信メールを送信いたしましたのでご確認ください。<br />
                                内容を確認次第、担当者より折り返しご連絡させていただきます。
                            </p>

                            <a href="index.html" className="group relative px-16 py-6 inline-flex overflow-hidden bg-black text-white transition-all duration-500 border border-black hover:border-gray-800">
                                <span className="relative z-10 font-bold tracking-[0.3em] uppercase text-xs flex items-center group-hover:text-black transition-colors duration-500">
                                    <i data-lucide="arrow-left" className="w-4 h-4 mr-4"></i>
                                    Back to Top
                                </span>
                                <div className="absolute inset-0 bg-white translate-x-full group-hover:translate-x-0 transition-transform duration-700 ease-out"></div>
                            </a>
                        </div>
                    </main>

                    {/* Footer (Simplified) */}
                    <footer className="py-10 text-center">
                        <p className="text-[10px] tracking-[0.3em] uppercase text-gray-300">© {new Date().getFullYear()} IT HUB Inc. All rights reserved.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
