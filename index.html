    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SvgShuffleText = ({ text }) => {
            const [displayText, setDisplayText] = useState(text);
            const [isAnimating, setIsAnimating] = useState(false);
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*アイウエオカキクケコサシスセソタチツテト';

            const animate = () => {
                if (isAnimating) return;
                setIsAnimating(true);
                let iteration = 0;

                const interval = setInterval(() => {
                    setDisplayText(prev => prev.split('').map((char, index) => {
                        // Math.floor(iteration) で比較することで、最初の文字もしっかりアニメーションする期間を作る
                        if (index < Math.floor(iteration) || text[index] === ' ' || text[index] === '　') {
                            return text[index];
                        }
                        return chars[Math.floor(Math.random() * chars.length)];
                    }).join(''));

                    if (iteration >= text.length) {
                        clearInterval(interval);
                        setDisplayText(text);
                        setIsAnimating(false);
                    }
                    // 文字の確定速度。0から開始して0.5ずつ増える
                    iteration += 1 / 2;
                }, 30);
            };

            useEffect(() => {
                // Initial animation on mount
                const timeout = setTimeout(animate, 500);
                return () => clearTimeout(timeout);
            }, []);

            return (
                <span
                    onMouseEnter={animate}
                    className="inline-block relative cursor-default"
                >
                    <svg className="absolute w-0 h-0 pointer-events-none">
                        <defs>
                            <filter id="svg-shuffle-glitch">
                                <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="1" result="noise" />
                                <feDisplacementMap in="SourceGraphic" in2="noise" scale={isAnimating ? "2" : "0"} xChannelSelector="R" yChannelSelector="G" />
                            </filter>
                        </defs>
                    </svg>
                    <span style={{ display: 'inline-block', filter: isAnimating ? 'url(#svg-shuffle-glitch)' : 'none', transition: 'filter 0.1s ease-in-out' }}>
                        {displayText}
                    </span>
                </span>
            );
        };
